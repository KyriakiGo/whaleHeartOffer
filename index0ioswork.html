<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lionfish</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }
</style>
</head>

<body>

<a-scene embedded>

  <!-- Lighting -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 0.9" position="1 2 2"></a-entity>

  <!-- 3D Model -->
  <a-entity 
    gltf-model="./assets/Lionfish.glb"
    position="0 0 -3"
    scale="1.5 1.5 1.5"
    material="side: double">
  </a-entity>

  <!-- Camera -->
  <a-camera position="0 0 0"></a-camera>

</a-scene>

<script>
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent);
  }

  if (isIOS()) {
    // Auto-open USDZ in AR Quick Look
    window.location.href = "./assets/Lionfish.usdz";
  }
</script>

</body>
</html>
