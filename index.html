<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lionfish AR</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

model-viewer{
width:100vw;
height:100vh;
}

#label{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
color:white;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<model-viewer

src="./assets/Lionfish.glb"
ios-src="./assets/Lionfish.usdz"

ar
ar-modes="webxr scene-viewer quick-look"

camera-controls
auto-rotate="false"

environment-image="neutral"
shadow-intensity="1"

ar-scale="auto"
ar-placement="floor"

>
<button slot="ar-button" id="ar-button">
Enter AR
</button>
</model-viewer>

<div id="label">
Tap AR to place the Lionfish in your environment
</div>

</body>
</html>
