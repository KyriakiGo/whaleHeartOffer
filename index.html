<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lionfish</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.rawgit.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras/dist/aframe-extras.controls.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- 3D Model -->
    <a-entity 
      id="modelEntity"
      gltf-model="./assets/Lionfish.glb" 
        material="side: double"
      position="0 0 -10" 
      scale="8 8 8" 
     // rotation="0 0 0"
     // animation="property: rotation; to: 0 360 0; loop: true; dur: 30000">
      

    </a-entity>

    <!-- Sound 
    <a-sound 
      id="ambientSound" 
      src="./assets/blue130.mp3" 
      loop="true" 
      position="0 1 -5">
    </a-sound> -->

    <!-- Camera with Orbit Controls -->
    <a-camera 
      position="0 0 0"
      orbit-controls="target: #modelEntity; enableDamping: true; dampingFactor: 0.1; rotateSpeed: 0.3; zoomSpeed: 0.5; minDistance: 2; maxDistance: 10;"
      look-controls="enabled: false">
    </a-camera>
  </a-scene>
<!-- iOS USDZ Fallback 
<div id="ios-ar-link" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none;">
  <a rel="ar" href="./assets/Lionfish.usdz">
    <img src="./assets/ar-icon.png" width="60">
  </a>
</div>

<script>
  // Detect iOS
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  }

  if (isIOS()) {
    document.querySelector('#ios-ar-link').style.display = 'block';
  }
</script> -->

  <script>
    // Ensure sound plays after user interaction
    document.addEventListener('click', () => {
      const soundEl = document.querySelector('#ambientSound');
      if (soundEl && soundEl.components.sound) {
        soundEl.components.sound.playSound();
      }
    }, { once: true });
  </script>
</body>
</html>
